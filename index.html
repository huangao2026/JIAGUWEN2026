<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球拓扑破译实验室 | Global Topology Lab</title>
    <!-- 核心依赖：使用更加稳定的 UMD 版本 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=JetBrains+Mono&display=swap');
        
        :root {
            --amber-500: #f59e0b;
        }

        body { 
            font-family: 'Noto Serif SC', 'Source Han Serif SC', serif; 
            background-color: #020202; 
            color: #e2e8f0; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* 极简加载动画占位 */
        #root:empty::before {
            content: 'SYSTEM INITIALIZING...';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.5em;
            color: var(--amber-500);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass-panel { 
            background: rgba(24, 24, 27, 0.6); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .scanning-loader { 
            border: 2px solid rgba(245, 158, 11, 0.2);
            border-top-color: #f59e0b; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 容错化的环境配置 ---
        const getSafeConfig = () => {
            try {
                return JSON.parse(window.__firebase_config || '{}');
            } catch (e) {
                return {};
            }
        };

        const firebaseConfig = getSafeConfig();
        const appId = window.__app_id || 'oracle-decipher-lab-default';
        const apiKey = window.apiKey || ''; 

        // 仅在配置有效时初始化
        const hasFirebase = !!firebaseConfig.apiKey;
        if (hasFirebase && !firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('lab');
            const [loading, setLoading] = useState(false);
            const [decipherments, setDecipherments] = useState([]);
            const [inputChar, setInputChar] = useState('');
            const [imagePreview, setImagePreview] = useState(null);
            const [aiResult, setAiResult] = useState('');

            // 1. 认证流 (带本地降级逻辑)
            useEffect(() => {
                if (!hasFirebase) {
                    console.warn("Firebase config missing. Square features disabled.");
                    return;
                }

                const auth = firebase.auth();
                const initAuth = async () => {
                    try {
                        if (window.__initial_auth_token) {
                            await auth.signInWithCustomToken(window.__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) {
                        console.error("Auth System Failed:", e);
                    }
                };
                initAuth();

                return auth.onAuthStateChanged(u => setUser(u));
            }, []);

            // 2. 数据监听 (带权限保护)
            useEffect(() => {
                if (!hasFirebase || !user) return;

                const db = firebase.firestore();
                const collectionPath = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('decipherments');
                
                const unsubscribe = collectionPath.onSnapshot(snapshot => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    const sorted = docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                    setDecipherments(sorted);
                }, (err) => {
                    console.error("Firestore Error:", err);
                });

                return () => unsubscribe();
            }, [user]);

            // 图片处理逻辑
            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setImagePreview(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            // AI 核心对撞
            const handleAiDecipher = async () => {
                if (!apiKey) {
                    alert("检测到密钥缺失。请在 Vercel 环境变量中配置 'apiKey'。如果是本地运行，请临时在代码第 52 行手动填入密钥字符串进行测试。");
                    return;
                }

                setLoading(true);
                setAiResult('');

                try {
                    const systemPrompt = "你是一位全球文字拓扑研究员。分析输入符号的几何特征、跨文明证据（苏美尔、玛雅等）并给出破译推论。150字内。";
                    let parts = [{ text: `拓扑特征描述：${inputChar || '视觉直接注入'}` }];
                    
                    if (imagePreview) {
                        parts.push({
                            inlineData: { mimeType: "image/png", data: imagePreview.split(',')[1] }
                        });
                    }

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "解析协议无响应。";
                    setAiResult(text);

                    // 存入广场 (如果 Firebase 可用)
                    if (hasFirebase && user) {
                        await firebase.firestore().collection('artifacts').doc(appId).collection('public').doc('data').collection('decipherments').add({
                            userId: user.uid,
                            analysis: text,
                            imageUrl: imagePreview,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                } catch (err) {
                    setAiResult(`对撞中断: ${err.message}`);
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col selection:bg-amber-500/30">
                    <nav className="h-20 border-b border-white/5 flex items-center justify-between px-8 bg-black/80 backdrop-blur-xl sticky top-0 z-50">
                        <div className="flex items-center space-x-4">
                            <div className="w-10 h-10 bg-amber-500 rounded-lg flex items-center justify-center text-black font-black text-xl italic">G</div>
                            <div className="hidden sm:block">
                                <div className="text-amber-500 font-black text-lg italic tracking-tighter leading-none">GLOBAL TOPOLOGY LAB</div>
                                <div className="text-[8px] mono opacity-30 tracking-[0.4em] mt-1 uppercase">Visual Logic Collider v2.1</div>
                            </div>
                        </div>
                        
                        <div className="flex bg-white/5 p-1 rounded-full border border-white/10">
                            <button onClick={() => setActiveTab('lab')} className={`px-6 py-2 rounded-full text-[10px] font-bold transition-all duration-300 ${activeTab === 'lab' ? 'bg-amber-500 text-black shadow-lg shadow-amber-500/20' : 'text-white/40 hover:text-white/60'}`}>对撞实验室</button>
                            <button onClick={() => setActiveTab('square')} className={`px-6 py-2 rounded-full text-[10px] font-bold transition-all duration-300 ${activeTab === 'square' ? 'bg-amber-500 text-black shadow-lg shadow-amber-500/20' : 'text-white/40 hover:text-white/60'}`}>符号广场</button>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto w-full p-6 md:p-12 flex-grow">
                        {activeTab === 'lab' ? (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                                {/* 输入区 */}
                                <div className="space-y-8 animate-in fade-in slide-in-from-left-8 duration-700">
                                    <div className="glass-panel p-8 rounded-[3rem] space-y-6 shadow-2xl">
                                        <div className="text-[10px] mono text-amber-500/60 uppercase tracking-[0.3em]">Phase 1: Visual Injection</div>
                                        
                                        <div className="relative group aspect-video rounded-[2rem] border-2 border-dashed border-white/10 hover:border-amber-500/30 flex items-center justify-center overflow-hidden bg-black/40 transition-all">
                                            <input type="file" accept="image/*" onChange={handleImageChange} className="absolute inset-0 opacity-0 cursor-pointer z-10" title="上传符号图像" />
                                            {imagePreview ? (
                                                <img src={imagePreview} className="w-full h-full object-contain p-4 animate-in zoom-in-95 duration-500" />
                                            ) : (
                                                <div className="text-center opacity-20 group-hover:opacity-40 transition-opacity">
                                                    <div className="text-6xl mb-4">𓁿</div>
                                                    <p className="text-[9px] font-bold tracking-widest uppercase">点击或拖入拓扑载体</p>
                                                </div>
                                            )}
                                        </div>

                                        <textarea 
                                            value={inputChar} 
                                            onChange={(e) => setInputChar(e.target.value)}
                                            placeholder="在此输入逻辑描述（例如：三个部分完全一样，像某种农具...）" 
                                            className="w-full h-36 bg-black/60 border border-white/5 rounded-[1.5rem] p-6 text-xs font-mono text-amber-100/70 outline-none focus:border-amber-500/20 transition-all placeholder:opacity-20"
                                        />

                                        <button 
                                            onClick={handleAiDecipher}
                                            disabled={loading}
                                            className="w-full py-6 bg-amber-500 hover:bg-amber-400 active:scale-[0.98] text-black font-black rounded-2xl text-[11px] uppercase tracking-[0.4em] transition-all disabled:opacity-30 disabled:grayscale shadow-xl shadow-amber-500/10"
                                        >
                                            {loading ? '正在进行文明对撞...' : '启动跨文明破译'}
                                        </button>
                                    </div>
                                </div>

                                {/* 输出区 */}
                                <div className="glass-panel p-10 rounded-[3rem] flex flex-col min-h-[500px] shadow-2xl animate-in fade-in slide-in-from-right-8 duration-700 delay-150">
                                    <div className="text-[10px] mono text-amber-500/60 uppercase tracking-[0.3em] mb-8">Phase 2: Decipherment Report</div>
                                    
                                    {loading ? (
                                        <div className="flex-grow flex flex-col items-center justify-center space-y-6">
                                            <div className="w-16 h-16 scanning-loader rounded-full"></div>
                                            <div className="text-[10px] mono text-amber-500/50 animate-pulse tracking-[0.5em] uppercase">Synthesizing Logic...</div>
                                        </div>
                                    ) : aiResult ? (
                                        <div className="animate-in fade-in zoom-in-95 duration-1000">
                                            <div className="prose prose-invert max-w-none">
                                                <p className="text-xl leading-relaxed italic text-slate-100 font-medium">“{aiResult}”</p>
                                            </div>
                                            <div className="mt-12 pt-8 border-t border-white/5 flex justify-between items-center">
                                                <div className="text-[9px] mono opacity-30 tracking-widest">PROCESSED BY GEMINI 2.5 FLASH</div>
                                                <div className="text-amber-500/40 text-xs">𓊖</div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="flex-grow flex flex-col items-center justify-center opacity-5 space-y-8">
                                            <div className="text-9xl">𓋹</div>
                                            <p className="text-[11px] font-mono tracking-[0.8em] uppercase italic">等待数据流注入实验室</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 animate-in fade-in slide-in-from-bottom-8 duration-700">
                                {decipherments.length > 0 ? decipherments.map(item => (
                                    <div key={item.id} className="glass-panel p-8 rounded-[2.5rem] space-y-6 hover:translate-y-[-4px] transition-all group">
                                        {item.imageUrl && (
                                            <div className="rounded-2xl overflow-hidden aspect-video bg-black/40">
                                                <img src={item.imageUrl} className="w-full h-full object-cover opacity-50 group-hover:opacity-80 transition-opacity" />
                                            </div>
                                        )}
                                        <p className="text-sm italic text-slate-300 leading-relaxed">“{item.analysis}”</p>
                                        <div className="flex items-center justify-between text-[8px] mono opacity-20 border-t border-white/5 pt-4 uppercase tracking-widest">
                                            <span>RESEARCHER_{item.userId?.slice(0,5)}</span>
                                            <span>{item.createdAt ? new Date(item.createdAt.seconds * 1000).toLocaleDateString() : 'REALTIME'}</span>
                                        </div>
                                    </div>
                                )) : (
                                    <div className="col-span-full py-32 flex flex-col items-center justify-center text-center space-y-6 opacity-20">
                                        <div className="text-5xl">𓃗</div>
                                        <p className="mono text-xs tracking-[0.5em] uppercase">
                                            {!hasFirebase ? "FIREBASE 配置未检测到，广场功能暂未联通" : "当前广场数据为空，等待首次破译结果同步"}
                                        </p>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="h-16 border-t border-white/5 flex items-center justify-center">
                        <div className="text-[9px] mono opacity-20 tracking-[0.5em] uppercase font-bold text-center px-4">
                            All symbols are connected through the root of consciousness.
                        </div>
                    </footer>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
