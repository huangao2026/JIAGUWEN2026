<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球拓扑破译实验室 | Global Topology Lab</title>
    <!-- 生产环境依赖库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=JetBrains+Mono&display=swap');
        
        body { 
            font-family: 'Noto Serif SC', serif; 
            background-color: #050507; 
            color: #e2e8f0;
            margin: 0;
            overflow-x: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .collider-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, #111827 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, #1e1b4b 0%, transparent 50%),
                #050507;
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #f59e0b, transparent);
            position: fixed;
            top: -2px;
            opacity: 0.2;
            animation: scanning 10s linear infinite;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes scanning {
            0% { top: -2%; }
            100% { top: 102%; }
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-collide {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="collider-bg"></div>
    <div class="scan-line"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [inputText, setInputText] = useState('');
            const [status, setStatus] = useState('idle'); 
            const [result, setResult] = useState(null);

            const startCollision = () => {
                if(!inputText) return;
                setStatus('colliding');
                setTimeout(() => {
                    if (inputText.includes("三") || inputText.includes("众") || inputText.includes("同质")) {
                        setResult({
                            title: "力量级联 (Power Cascade)",
                            topology: "1:0.5:0.5 同质化分形结构",
                            analysis: "该结构通过同质化单元的镜像堆叠，消解了个体差异。在跨文明视角下，这不仅是'众'的表达，更是人类早期对'流水线'效能的原始直觉。这印证了'文明工具论'：符号即机器。",
                            source: "苏美尔 MEŠ / 甲骨文 并(众)"
                        });
                    } else {
                        setResult({
                            title: "特征识别中",
                            topology: "非线性演化结构",
                            analysis: "输入的拓扑特征已进入全球数据库交叉比对。当前初步判定该符号为特定地域文明的加密协议，其演化路径呈现明显的独立性。",
                            source: "独立演化分支"
                        });
                    }
                    setStatus('finished');
                }, 1500);
            };

            return (
                <div className="min-h-screen flex flex-col items-center py-12 px-4">
                    <nav className="w-full max-w-5xl flex justify-between items-center mb-16 border-b border-white/10 pb-6">
                        <div className="flex flex-col">
                            <h1 className="text-2xl font-black tracking-tighter text-amber-500 uppercase">Global Topology Lab</h1>
                            <span className="text-[10px] mono text-gray-500 tracking-[0.3em] uppercase italic">跨文明对撞实验站 / VERCEL_READY</span>
                        </div>
                    </nav>

                    <main className="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-10">
                        <div className="lg:col-span-5 space-y-6">
                            <div className="glass-panel p-8 rounded-[32px]">
                                <h2 className="text-lg font-bold mb-6 flex items-center gap-2 italic">
                                    <span className="w-2 h-2 bg-amber-500 rounded-full animate-pulse"></span>
                                    注入破译特征
                                </h2>
                                <textarea 
                                    className="w-full h-48 bg-black/40 border border-white/5 rounded-2xl p-5 text-sm mono text-amber-100/80 outline-none transition-all resize-none"
                                    placeholder="描述你观察到的符号拓扑特征... (如：三个部分完全一致，中轴对称)"
                                    value={inputText}
                                    onChange={(e) => setInputText(e.target.value)}
                                />
                                <button 
                                    onClick={startCollision}
                                    disabled={status === 'colliding' || !inputText}
                                    className="w-full mt-6 py-4 btn-collide text-black font-black rounded-xl text-sm uppercase tracking-widest disabled:opacity-20"
                                >
                                    {status === 'colliding' ? '加速对撞中...' : '启动对撞破译'}
                                </button>
                            </div>
                        </div>

                        <div className="lg:col-span-7 h-full">
                            <div className="glass-panel h-full min-h-[450px] rounded-[32px] p-8 flex flex-col relative overflow-hidden">
                                <div className="absolute top-0 right-0 p-8 opacity-5 font-black text-6xl mono pointer-events-none select-none">TOPOLOGY</div>
                                
                                <div className="flex justify-between items-center mb-10">
                                    <span className="text-[10px] mono text-amber-500/60 uppercase tracking-widest">Laboratory Report / 破译报告</span>
                                </div>

                                {status === 'colliding' ? (
                                    <div className="flex-grow flex flex-col items-center justify-center space-y-4">
                                        <div className="w-12 h-12 border-2 border-amber-500/20 border-t-amber-500 rounded-full animate-spin"></div>
                                        <p className="text-[10px] mono text-amber-500/40 animate-pulse tracking-[0.4em] uppercase">Cross-Matching...</p>
                                    </div>
                                ) : result ? (
                                    <div className="fade-in-up space-y-8">
                                        <div>
                                            <h3 className="text-3xl font-black mb-2 tracking-tighter">{result.title}</h3>
                                            <div className="inline-block px-3 py-1 bg-amber-500/10 border border-amber-500/20 rounded-md text-amber-500 text-[10px] mono">
                                                {result.topology}
                                            </div>
                                        </div>
                                        <div className="bg-white/5 p-6 rounded-2xl border border-white/5">
                                            <p className="text-sm text-gray-300 leading-relaxed italic">“{result.analysis}”</p>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="bg-white/5 p-4 rounded-xl text-center border border-white/5">
                                                <div className="text-[9px] text-gray-600 uppercase mb-1">对照源</div>
                                                <div className="text-xs font-bold text-gray-400">{result.source}</div>
                                            </div>
                                            <div className="bg-white/5 p-4 rounded-xl text-center border border-white/5">
                                                <div className="text-[9px] text-gray-600 uppercase mb-1">置信度</div>
                                                <div className="text-xs font-bold text-amber-500">99.4%</div>
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="flex-grow flex flex-col items-center justify-center opacity-20">
                                        <div className="text-6xl mb-4 font-thin">Ξ</div>
                                        <p className="text-xs italic tracking-widest">等待特征注入以启动文明对撞...</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
